name: Generate Proto Code

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Install Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Clone Proto Files Repository
        run: git clone https://github.com/Oralkhan-coder/order-payment-proto-files.git

      - name: Generate Go Code from Proto Files
        run: |
          mkdir -p gen/payment/v1
          mkdir -p gen/order/v1
          cd order-payment-proto-files
          protoc \
            --proto_path=proto \
            --go_out=../gen \
            --go_opt=paths=source_relative \
            --go-grpc_out=../gen \
            --go-grpc_opt=paths=source_relative \
            proto/payment/v1/payment.proto \
            proto/order/v1/order.proto

      - name: Clone Generator Repository
        run: |
          git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/Oralkhan-coder/order-payment-proto-generation.git out

      - name: Create go.mod in generated repo
        run: |
          cd out
          cat > go.mod << 'EOF'
          module github.com/Oralkhan-coder/order-payment-proto-generation

          go 1.21

          require (
            google.golang.org/grpc v1.60.0
            google.golang.org/protobuf v1.31.0
          )
          EOF
          go mod tidy

      - name: Push Generated Files
        run: |
          cp -r gen/* out/
          cd out
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add .
          git diff --staged --quiet || git commit -m "regen from proto"
          git push
