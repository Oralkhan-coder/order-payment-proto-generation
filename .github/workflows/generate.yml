name: Generate Proto Code

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'proto/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Protos Repo
        uses: actions/checkout@v4
        with:
          path: order-payment-protos

      - name: Install Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Generate Code
        run: |
          mkdir -p gen
          # This command finds all .proto files and generates them at once
          protoc \
            --proto_path=order-payment-protos/proto \
            --go_out=gen --go_opt=paths=source_relative \
            --go-grpc_out=gen --go-grpc_opt=paths=source_relative \
            $(find order-payment-protos/proto -name "*.proto")

      - name: Clone & Update Generated Repo
        env:
          PAT: ${{ secrets.PAT_TOKEN }}
        run: |
          git clone https://x-access-token:$PAT@github.com/Oralkhan-coder/order-payment-proto-generation.git out
          cp -r gen/* out/
          
          cd out
          # Initialize go.mod if it doesn't exist
          if [ ! -f go.mod ]; then
            go mod init github.com/Oralkhan-coder/order-payment-proto-generation
          fi
          
          go mod tidy
          
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "Regen from proto: ${{ github.sha }}" || echo "No changes"
          git push origin main